    <nav class="na-bg">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
            <i data-lucide="terminal" size="24"></i>
            Tarun<span>.K</span>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="project.html">Projects</a></li>
            <li><a href="restof.html">My Expertise</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

        <div class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Staggered Mobile Menu Overlay -->
    <div class="mobile-menu" id="mobileMenu">
        <div class="menu-layer"></div>
        <div class="menu-layer"></div>
        <div class="menu-layer"></div>
        <div class="menu-content">
            <nav
                style="position: static; background: transparent; backdrop-filter: none; border: none; justify-content: center;">
                <ul style="flex-direction: column; display: flex; align-items: center; gap: 2rem;">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="project.html">Projects</a></li>

                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </div>


    <main>
        <!-- Contact Section -->
        <section id="contact" class="page-section">

            <div style="max-width: 800px; margin: 0 auto; text-align: center;" class="reveal">
                <h2>Let's build something exceptional.</h2>
                <p style="color: var(--text-secondary); margin: 2rem 0 3rem;">Currently accepting select inquiries for
                    contract work and collaborations.</p>

                <form action="https://formspree.io/f/mqeyqlzw" method="post" id="contactForm"
                    style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; text-align: left;">
                    <input type="text" name="name" placeholder="Full Name" required
                        style="grid-column: span 1; background: var(--surface); border: 1px solid var(--border); padding: 1rem; border-radius: 8px; color: white;">
                    <input type="email" name="email" placeholder="Email Address" required
                        style="grid-column: span 1; background: var(--surface); border: 1px solid var(--border); padding: 1rem; border-radius: 8px; color: white;">
                    <textarea name="message" placeholder="Message" rows="5" required
                        style="grid-column: span 2; background: var(--surface); border: 1px solid var(--border); padding: 1rem; border-radius: 8px; color: white;"></textarea>
                    <button type="submit" class="btn btn-primary"
                        style="grid-column: span 2; border: none; cursor: pointer;">Connect</button>
                </form>
            </div>
            <div style="display: flex; gap: 2rem; margin-top: 3rem; justify-content: center;">
                <a href="http://github.com/tarunk8060" target="_blank"
                    style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; transition: color 0.3s ease;">
                    <i data-lucide="github"></i> GitHub
                </a>
                <a href="https://www.linkedin.com/in/tarunkuppusamy/" target="_blank"
                    style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; transition: color 0.3s ease;">
                    <i data-lucide="linkedin"></i> LinkedIn
                </a>
            </div>

        </section>
    </main>

    <footer
        style="padding: 4rem 10%; border-top: 1px solid var(--border); color: var(--text-secondary); font-size: 0.9rem; display: flex; justify-content: center;">
        <p class="lst">© 2026 Tarun K. All rights reserved.</p>
    </footer>


    <script src="index.js"></script>
</body>

</html>
